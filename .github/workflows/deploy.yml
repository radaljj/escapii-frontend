name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 37.27.194.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.php,images/,style.css,assets/"
          target: /var/www/escapii/wp-content/themes/escapii-theme/
          strip_components: 0
